<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deepfake + AI Image Detector</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 2rem; background: #f5f5f5; }
    .box { background: #fff; padding: 2rem; border-radius: 8px; max-width: 500px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    .result { margin-top: 1rem; font-weight: bold; color: #333; }
    button { padding: 0.5rem 1rem; font-size: 1rem; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Check Image Authenticity</h2>
    <form method="POST" enctype="multipart/form-data">
      <input type="file" name="file" accept="image/*" required>
      <br><br>
      <button type="submit">Upload & Analyze</button>
    </form>

    {% if face_result and art_result %}
    <div class="result">
      <p>🔍 <strong>Face Model:</strong> {{ face_result }}</p>
      <p>🎨 <strong>Art Model:</strong> {{ art_result }}</p>
    </div>
    {% endif %}
  </div>
</body>
</html>
